name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same branch /
# PR head — saves runner time when authors push rapidly.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Pin the SDK from global.json so a single source of truth governs
      # the toolchain for both local dev and CI. NuGet packages cached
      # by the action via the global-packages folder.
      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore PrInbox.slnx

      # Warnings-as-errors is enabled in the csproj files; a warning here
      # fails the build, which is the policy.
      - name: Build
        run: dotnet build PrInbox.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PrInbox.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn
